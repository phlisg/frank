<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 110" fill="none">
  <defs>
    <linearGradient id="badge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c084fc"/>
      <stop offset="50%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="badge-rim" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#d8b4fe"/>
      <stop offset="100%" style="stop-color:#9333ea"/>
    </linearGradient>
  </defs>

  <!-- Hexagon badge -->
  <path d="
    M50,4 L93,27 L93,83 L50,106 L7,83 L7,27 Z
  " fill="url(#badge)" stroke="url(#badge-rim)" stroke-width="2.5"/>

  <!-- Lightning bolt -->
  <path d="M56,24 L30,55 h16 L38,86 L66,50 H48 Z" fill="white"/>
</svg>
