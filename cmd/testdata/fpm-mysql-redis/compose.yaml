# Generated by Frank — edit frank.yaml, not this file

networks:
    frank:
        driver: bridge
services:
    laravel.test:
        build:
            args:
                WWWGROUP: ${GID:-1000}
            context: .
            dockerfile: Dockerfile
        env_file:
            - .env
        environment:
            - APP_ENV=local
            - APP_DEBUG=true
            - PSYSH_CONFIG=/var/www/html/.psysh.php
            - PSYSH_HOME=/var/www/html/storage/psysh
            - WWWUSER=${UID:-1000}
        networks:
            - frank
        stdin_open: true
        tty: true
        volumes:
            - .:/var/www/html
        working_dir: /var/www/html
    mysql:
        environment:
            MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
            MYSQL_DATABASE: ${DB_DATABASE}
            MYSQL_PASSWORD: ${DB_PASSWORD}
            MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
            MYSQL_USER: ${DB_USERNAME}
        healthcheck:
            interval: 5s
            retries: 10
            test:
                - CMD
                - mysqladmin
                - ping
                - -h
                - localhost
                - -p${DB_PASSWORD}
            timeout: 3s
        image: mysql:latest
        networks:
            - frank
        ports:
            - 3306:3306
        volumes:
            - mysql_data:/var/lib/mysql
    nginx:
        build:
            context: .
            dockerfile: nginx.Dockerfile
        depends_on:
            - laravel.test
        networks:
            - frank
        ports:
            - 80:80
            - 443:443
            - 5173:5173
        volumes:
            - .:/var/www/html
    redis:
        healthcheck:
            interval: 5s
            retries: 10
            test:
                - CMD
                - redis-cli
                - ping
            timeout: 3s
        image: redis:alpine
        networks:
            - frank
        ports:
            - 6379:6379
        volumes:
            - redis_data:/data
volumes:
    mysql_data:
        driver: local
    redis_data:
        driver: local
