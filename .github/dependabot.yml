version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    target-branch: develop
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps"
    labels:
      - dependencies
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    target-branch: develop
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"
    labels:
      - ci
